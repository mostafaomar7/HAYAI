<div class="page-container">
  
  <header class="top-header">
    <button class="back-btn" (click)="goBack()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
      Add Hyperbaric Oxygen
    </button>
  </header>

  <div class="content-wrapper">
    
    <section class="form-section">
      <h3>Basic Information</h3>
      
      <div class="form-group">
        <label>Status</label>
        <div class="status-toggle-group">
          <button [class.active]="status === 'Active'" (click)="setStatus('Active')">Active</button>
          <button [class.active]="status === 'Inactive'" (click)="setStatus('Inactive')">Inactive</button>
        </div>
      </div>

      <div class="form-group">
        <label>Organization name</label>
        <input type="text" value="Healthcare For All" placeholder="Enter name">
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea rows="3">Established in 2010, Al Noor Hospital is a leading healthcare facility providing comprehensive medical services with a focus on patient safety and high-quality care.</textarea>
      </div>

      <div class="form-group">
        <label>Notes</label>
        <textarea rows="3">Established in 2010, Al Noor Hospital is a leading healthcare facility providing comprehensive medical services with a focus on patient safety and high-quality care.</textarea>
      </div>
    </section>

    <section class="form-section">
      <h3>Services Provided</h3>
      <div class="upload-area">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="#2563EB" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
        <p class="upload-title">Click to upload image</p>
        <p class="upload-desc">PNG, JPG up to 10MB</p>
      </div>

      <div class="image-preview-wrapper">
        <img src="https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?ixlib=rb-1.2.1&auto=format&fit=crop&w=1200&q=80" class="preview-img">
        <button class="remove-img-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
      </div>
    </section>

    <section class="form-section">
      <h3>Available Dates & Times</h3>
      <div class="dates-grid">
        @for (day of days; track day.name) {
          <div class="date-input-card">
            <div class="day-header">
              <span class="day-name">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#6B7280" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                {{ day.name }}
              </span>
              <label class="toggle-switch">
                <input type="checkbox" [(ngModel)]="day.active">
                <span class="slider"></span>
              </label>
            </div>
            <div class="time-inputs">
              <input type="text" placeholder="From" [disabled]="!day.active" [(ngModel)]="day.from">
              <input type="text" placeholder="To" [disabled]="!day.active" [(ngModel)]="day.to">
            </div>
          </div>
        }
      </div>
    </section>

    <section class="form-section">
      <h3>Contacts</h3>
      <div class="add-contact-row">
        <input type="text" placeholder="Contact name" [(ngModel)]="newContactName">
        <input type="text" placeholder="Phone number" [(ngModel)]="newContactPhone">
        <button class="btn-primary" (click)="addContact()">Add contact</button>
      </div>

      <div class="contacts-grid">
        @for (contact of contacts; track $index) {
          <div class="contact-card">
            <div>
              <h4>{{ contact.type }}</h4>
              <div class="phone-info">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="#6B7280" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
                {{ contact.phone }}
              </div>
            </div>
            <button class="remove-contact-btn" (click)="removeContact($index)">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#EF4444" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
          </div>
        }
      </div>
    </section>

  </div>

  <footer class="form-footer">
    <button class="btn-cancel" (click)="goBack()">Cancel</button>
    <button class="btn-primary">Save Changes</button>
  </footer>
</div>
