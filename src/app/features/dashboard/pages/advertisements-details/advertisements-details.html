<div class="details-container">
  
  <header class="details-header">
    <button class="back-btn" (click)="goBack()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
      Back
    </button>
    <h1>Edit Advertisements</h1> </header>

  <div class="form-section">
    
    <div class="form-group">
      <label>Redirect link</label>
      <input type="text" placeholder="Link: yellowpages.com" value="Link: yellowpages.com" />
    </div>

    <div class="form-group">
      <label>Services Provided</label>
      
      @if (!uploadedImage) {
        <div class="upload-box">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="#3B82F6" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
          <span class="upload-title">Click to upload image</span>
          <span class="upload-subtitle">PNG,JPG up to 10MB</span>
        </div>
      } @else {
        <div class="image-preview-container">
          <img [src]="uploadedImage" alt="Uploaded Preview" class="preview-img" />
          <button class="remove-btn" (click)="removeImage()">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#ffffff" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      }

    </div>
  </div>

</div>
