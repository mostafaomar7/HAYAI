<div class="page-container">
  
  <div class="top-bar">
    <div class="actions-wrapper">
      
      <div class="search-box">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#6B7280" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <input type="text" placeholder="Search" />
      </div>

      <div class="filter-wrapper">
        <button class="filter-btn" (click)="toggleFilter()">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
          </svg>
          Filter
        </button>

        @if (showFilter) {
          <div class="filter-popup">
            <div class="popup-header">
              <h3>Filter</h3>
              <button class="close-icon" (click)="toggleFilter()">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#111827" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
              </button>
            </div>
            
            <div class="popup-body">
              <label>Status</label>
              <div class="custom-select">
                <select>
                  <option value="">Select status</option>
                  <option value="available">Available</option>
                  <option value="inactive">Inactive</option>
                </select>
              </div>
            </div>

            <div class="popup-footer">
              <button class="reset-btn" (click)="toggleFilter()">Reset</button>
              <button class="apply-btn" (click)="toggleFilter()">Apply Filters</button>
            </div>
          </div>
        }
      </div>

      <button class="add-btn" (click)="goToAdd()">Add</button>
    </div>
  </div>

  <div class="cards-grid">
    @for (item of charityList; track item.id) {
      
      <div class="charity-card" (click)="goToDetails(item.id)">
        
        <div class="card-image-wrapper">
          <img src="https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Hospital" class="card-image" />
          
          <div class="card-actions">
            <button class="icon-btn" (click)="goToEdit(item.id, $event)">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#374151" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.5z" />
              </svg>
            </button>
            <button class="icon-btn delete-btn" (click)="$event.stopPropagation()">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#374151" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
            </button>
          </div>
        </div>

        <div class="card-body">
          <div class="card-header-row">
            <h3 class="card-title">{{ item.name }}</h3> 
            <span class="status-badge">available</span>
          </div>

          <div class="card-info-row">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#9CA3AF" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span class="info-text">Healthcare For All</span>
          </div>

          <div class="card-stats-row">
            <div class="stat-item">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#9CA3AF" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
              </svg>
              <span class="info-text">3 Contacts</span>
            </div>
            <span class="dot-separator">•</span>
            <div class="stat-item">
              <span class="info-text">5 Services</span>
            </div>
          </div>
        </div>

      </div>
    }
  </div>

</div>
