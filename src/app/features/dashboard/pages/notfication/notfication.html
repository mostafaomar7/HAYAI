<div class="page-container">
  
  <div class="notification-card">
    
    <div class="form-group">
      <label>Notification title</label>
      <input type="text" placeholder="Enter notification title" />
    </div>

    <div class="form-group">
      <label>Notification details</label>
      <textarea placeholder="Write your message here ..." rows="6"></textarea>
    </div>

    <div class="form-group">
      <label>Target Audience</label>
      <div class="custom-select">
        <select>
          <option value="" disabled selected>Select user type</option>
          <option value="all">All Users</option>
          <option value="doctors">Doctors</option>
          <option value="hospitals">Hospitals</option>
          <option value="patients">Patients</option>
        </select>
      </div>
    </div>

    <div class="form-actions">
      <button class="send-btn" (click)="sendNotification()">Send Notification</button>
    </div>

  </div>

</div>
