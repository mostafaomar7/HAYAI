<div class="page-container">
  
  <div class="top-actions">
    <div class="search-box">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#6B7280" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
      <input type="text" placeholder="Search" />
    </div>
    <button class="add-btn" (click)="goToAdd()">Add</button>
  </div>

  <div class="plans-grid">
    @for (plan of plansList; track plan.id) {
      <div class="plan-card" (click)="goToDetails(plan.id)">
        <div class="card-header">
          <div class="title-area">
            <span class="plan-super-title">{{ plan.title }}</span>
            <h3 class="plan-main-title">{{ plan.subtitle }}</h3>
            <p class="plan-desc">{{ plan.desc }}</p>
          </div>
          <span class="plan-badge">{{ plan.type }}</span>
        </div>
        
        <div class="divider"></div>

        <ul class="features-list">
          @for (feat of plan.features; track feat.name) {
            <li [class.not-included]="!feat.included">
              @if (feat.included) {
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#2563EB" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#9CA3AF" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
              }
              <span>{{ feat.name }}</span>
              <svg class="info-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
            </li>
          }
        </ul>
      </div>
    }
  </div>
</div>
