<div class="page-container">
  
  <div class="table-card">
    
    <div class="table-header">
      <div class="title-area">
        <h2>Renewal Users</h2>
        <span class="badge">100 users</span>
      </div>

      <div class="actions-area">
        <div class="search-box">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#6B7280" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          <input type="text" placeholder="Search" />
        </div>

        <div class="filter-wrapper">
          <button class="filter-btn" (click)="toggleFilter()">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
            </svg>
            Filter
          </button>

          @if (showFilter) {
            <div class="filter-popup">
              <div class="popup-header">
                <h3>Filter</h3>
                <button class="close-icon" (click)="toggleFilter()">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#111827" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                  </svg>
                </button>
              </div>
              
              <div class="popup-body">
                <div class="form-group">
                  <label>User type</label>
                  <div class="custom-select">
                    <select><option value="">Select user type</option></select>
                  </div>
                </div>
                <div class="form-group">
                  <label>Plan</label>
                  <div class="custom-select">
                    <select><option value="">Select plan</option></select>
                  </div>
                </div>
              </div>

              <div class="popup-footer">
                <button class="reset-btn" (click)="toggleFilter()">Reset</button>
                <button class="apply-btn" (click)="toggleFilter()">Apply Filters</button>
              </div>
            </div>
          }
        </div>

        <button class="renew-all-btn">Renew All Users</button>
      </div>
    </div>

    <div class="table-responsive">
      <table class="data-table">
        <thead>
          <tr>
            <th class="checkbox-col"><input type="checkbox"></th>
            <th>User name</th>
            <th>User type</th>
            <th>Expired plan</th>
            <th>Expired date</th>
            <th class="action-col"></th>
          </tr>
        </thead>
        <tbody>
          @for (user of renewalUsers; track user.id) {
            <tr>
              <td class="checkbox-col"><input type="checkbox"></td>
              <td>
                <div class="user-cell">
                  <img [src]="user.avatar" alt="Avatar" class="avatar">
                  <span class="user-name">{{ user.name }}</span>
                </div>
              </td>
              <td class="text-gray">{{ user.type }}</td>
              <td class="text-gray">{{ user.plan }}</td>
              <td class="text-gray">{{ user.date }}</td>
              <td class="action-col">
                <button class="renew-btn">Renewal</button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>

    <div class="table-footer">
      <button class="pagination-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
        Previous
      </button>
      
      <div class="page-numbers">
        <button class="page-num active">1</button>
        <button class="page-num">2</button>
        <button class="page-num">3</button>
        <span class="dots">...</span>
        <button class="page-num">8</button>
        <button class="page-num">9</button>
        <button class="page-num">10</button>
      </div>

      <button class="pagination-btn">
        Next
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
      </button>
    </div>

  </div>
</div>
